<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PiDrop{% block title %}{% endblock %}</title>
  <style>
    :root {
      --bg:       #171614; --surface:  #1c1b19; --surface2: #242321;
      --border:   #393836; --text:     #cdccca;  --muted:    #797876;
      --primary:  #4f98a3; --success:  #6daa45;  --warning:  #fdab43;
      --error:    #dd6974; --radius:   0.5rem;
      --font: 'Inter', system-ui, sans-serif;
    }
    [data-theme="light"] {
      --bg: #f7f6f2; --surface: #f9f8f5; --surface2: #ffffff;
      --border: #d4d1ca; --text: #28251d; --muted: #7a7974;
      --primary: #01696f;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--bg); color: var(--text);
           min-height: 100dvh; font-size: 1rem; line-height: 1.6; }
    a { color: var(--primary); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* NAV */
    nav { background: var(--surface); border-bottom: 1px solid var(--border);
          padding: 0 1.5rem; display: flex; align-items: center;
          justify-content: space-between; height: 56px; }
    .nav-logo { font-size: 1.1rem; font-weight: 700; color: var(--primary);
                letter-spacing: -0.02em; }
    .nav-links { display: flex; gap: 1.5rem; align-items: center; }
    .nav-links a { color: var(--muted); font-size: 0.9rem; }
    .nav-links a:hover { color: var(--text); text-decoration: none; }
    .theme-btn { background: none; border: 1px solid var(--border); color: var(--muted);
                 border-radius: var(--radius); padding: 0.25rem 0.6rem;
                 cursor: pointer; font-size: 0.8rem; }
    .theme-btn:hover { color: var(--text); border-color: var(--text); }

    /* LAYOUT */
    main { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

    /* CARDS */
    .card { background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 1.25rem; }

    /* GRID */
    .grid-5 { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1rem; }

    /* TABLE */
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th { text-align: left; padding: 0.5rem 0.75rem; color: var(--muted);
         border-bottom: 1px solid var(--border); font-weight: 500; }
    td { padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }

    /* BADGES */
    .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 999px;
             font-size: 0.75rem; font-weight: 500; }
    .badge-documents { background: #1e3a4a; color: #4f98a3; }
    .badge-portfolio  { background: #2a3a1e; color: #6daa45; }
    .badge-samples    { background: #3a1e1e; color: #dd6974; }
    .badge-media      { background: #3a2e1e; color: #fdab43; }
    .badge-quarantine { background: #2e2a1e; color: #e8af34; }

    /* FLASH */
    .flash { padding: 0.75rem 1rem; border-radius: var(--radius);
             margin-bottom: 1rem; font-size: 0.875rem; }
    .flash-success { background: #2a3a1e; color: #6daa45; }
    .flash-error   { background: #3a1e1e; color: #dd6974; }


    .upload-shell {
  max-width: 1160px;
  margin: 0 auto;
  padding: 2rem 0 3rem;
}

.upload-header {
  text-align: center;
  margin-bottom: 2rem;
}

.eyebrow {
  color: var(--primary);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-size: 0.78rem;
  margin-bottom: 0.5rem;
}

.upload-header h1 {
  font-size: clamp(2rem, 1.6rem + 1.8vw, 3.4rem);
  margin-bottom: 0.5rem;
}

.upload-subtitle {
  color: var(--muted);
  max-width: 60ch;
  margin: 0 auto;
  font-size: 0.98rem;
}

.upload-layout {
  display: grid;
  grid-template-columns: minmax(0, 1.5fr) minmax(280px, 0.8fr);
  gap: 1.25rem;
  align-items: start;
}

.upload-main-card,
.upload-side-card {
  padding: 1.5rem;
}

.section-head h2,
.upload-side-card h3 {
  font-size: 1.05rem;
  margin-bottom: 0.35rem;
}

.section-head p,
.upload-side-card p,
.upload-side-card li {
  color: var(--muted);
  font-size: 0.9rem;
}

.field-label {
  display: block;
  margin: 1.1rem 0 0.45rem;
  font-size: 0.82rem;
  color: var(--muted);
}

.input-control {
  width: 100%;
  padding: 0.8rem 0.9rem;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 0.95rem;
}

.dropzone {
  margin-top: 1rem;
  border: 2px dashed var(--border);
  border-radius: 1rem;
  min-height: 280px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 0.6rem;
  text-align: center;
  cursor: pointer;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.015), rgba(255,255,255,0.01));
  transition: border-color 180ms ease, transform 180ms ease, background 180ms ease;
}

.dropzone:hover,
.dropzone.is-dragging {
  border-color: var(--primary);
  transform: translateY(-2px);
  background:
    linear-gradient(180deg, rgba(79,152,163,0.08), rgba(79,152,163,0.03));
}

.dropzone-icon {
  font-size: 2.4rem;
  color: var(--primary);
}

.dropzone h3 {
  font-size: 1.15rem;
}

.dropzone p {
  color: var(--muted);
  font-size: 0.92rem;
}

.dropzone-link {
  color: var(--primary);
  font-weight: 600;
}

.upload-actions {
  margin-top: 1rem;
}

.primary-btn {
  width: 100%;
  padding: 0.9rem 1rem;
  border: none;
  border-radius: 0.8rem;
  background: var(--primary);
  color: white;
  font-size: 0.96rem;
  font-weight: 700;
  cursor: pointer;
  transition: transform 180ms ease, opacity 180ms ease;
}

.primary-btn:hover {
  transform: translateY(-1px);
  opacity: 0.95;
}

.queue {
  margin-top: 1rem;
}

.queue-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 1rem;
  padding: 0.9rem 1rem;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 0.8rem;
  margin-bottom: 0.65rem;
}

.queue-file {
  display: flex;
  align-items: center;
  gap: 0.8rem;
  min-width: 0;
}

.queue-file-icon {
  width: 38px;
  height: 38px;
  display: grid;
  place-items: center;
  border-radius: 0.7rem;
  background: rgba(79,152,163,0.12);
}

.queue-file-name {
  font-size: 0.92rem;
  font-weight: 600;
  word-break: break-word;
}

.queue-file-meta {
  color: var(--muted);
  font-size: 0.8rem;
}

.queue-status {
  font-size: 0.82rem;
  color: var(--muted);
  white-space: nowrap;
}

.status-uploading { color: var(--warning); }
.status-success { color: var(--success); }
.status-error { color: var(--error); }

.side-list {
  margin-top: 0.8rem;
  padding-left: 1rem;
}

.side-list li {
  margin-bottom: 0.65rem;
}

.side-divider {
  height: 1px;
  background: var(--border);
  margin: 1rem 0 1.2rem;
}

.mini-steps {
  display: grid;
  gap: 0.75rem;
  margin-top: 0.75rem;
}

.mini-step {
  display: flex;
  align-items: center;
  gap: 0.8rem;
  padding: 0.8rem;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 0.8rem;
}

.mini-step span {
  width: 28px;
  height: 28px;
  display: grid;
  place-items: center;
  border-radius: 999px;
  background: rgba(79,152,163,0.14);
  color: var(--primary);
  font-size: 0.82rem;
  font-weight: 700;
}

.mini-step p {
  margin: 0;
  color: var(--text);
  font-size: 0.88rem;
}

@media (max-width: 900px) {
  .upload-layout {
    grid-template-columns: 1fr;
  }

  .upload-header {
    text-align: left;
  }

  .upload-subtitle {
    margin: 0;
  }
}



  </style>
</head>
<body>
<nav>
  <span class="nav-logo">⬡ PiDrop</span>
  <div class="nav-links">
    <a href="/">Dashboard</a>
    <a href="/upload">Upload</a>
    <a href="/files/documents">Files</a>
    <a href="/qr">QR</a>
    <button class="theme-btn" onclick="toggleTheme()">◐ Theme</button>
  </div>
</nav>
<main>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="flash flash-{{ cat }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</main>
<script>
  function toggleTheme() {
    const h = document.documentElement;
    h.setAttribute('data-theme', h.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
  }
</script>
</body>
</html>
